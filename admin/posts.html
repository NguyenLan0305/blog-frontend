<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>BlogAdmin | Post Moderation</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;700&display=swap"
          rel="stylesheet"/>
    <link rel="stylesheet" type="text/css" href="/assets/css/main.css"/>

    <script id="tailwind-config">
        tailwind.config = {
            
            theme: {
                extend: {
                    colors: {
                        "admin-bg": "var(--bg)",
                        "admin-side": "var(--secondary)",
                        "admin-primary": "var(--primary)"
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; vertical-align: middle; }
        ::-webkit-scrollbar { display: none; }
        html { -ms-overflow-style: none; scrollbar-width: none; }

        aside { position: fixed; left: 0; top: 0; height: 100vh; width: 220px; background-color: var(--secondary); z-index: 1100; }
        header { position: fixed; top: 0; right: 0; left: 220px; height: 64px; background: var(--card); border-bottom: 1px solid rgba(24,32,47,0.08); z-index: 1000; display: flex; align-items: center; padding: 0 32px; justify-content: space-between; }
        main { margin-left: 220px; padding-top: 84px !important; min-height: 100vh; }

        .nav-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; color: var(--muted); text-decoration: none; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.2s; }
        .nav-item:hover, .nav-item.active { color: var(--primary); background: rgba(109,93,246,0.10); border-right: 4px solid var(--primary); }

        .filter-select { appearance: none; background-color: var(--card); border: 1px solid var(--border); padding: 0.75rem 2.5rem 0.75rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; color: var(--muted); cursor: pointer; outline: none; transition: all 0.2s; }
        .filter-select:focus { border-color: var(--primary); }

        /* Toast Styling */
        #toast {
            visibility: hidden; min-width: 250px; background-color: var(--primary); color: var(--card);
            text-align: center; border-radius: 8px; padding: 16px; position: fixed;
            z-index: 3000; right: 30px; bottom: 30px; font-size: 14px; font-weight: 600;
            box-shadow: 0 4px 12px rgba(24,32,47,0.12);
        }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        /* Pagination Styling */
        .pagination-btn {
            padding: 6px 12px; border: 1px solid var(--border); border-radius: 4px;
            font-size: 12px; font-weight: 600; transition: all 0.2s; background: var(--card);
        }
        .pagination-btn.active {
            background-color: var(--primary); color: var(--card); border-color: var(--primary);
        }
        .pagination-btn:hover:not(.active) {
            background-color: var(--bg-card-h);
        }
    </style>
</head>
<body>

<div id="toast">Action completed successfully!</div>

<div id="sidebar-placeholder"></div>

<header>
    <h2 class="text-lg font-bold text-[var(--text)] uppercase tracking-tight">Post Moderation</h2>
    <div class="flex items-center gap-6">
        <button class="relative text-slate-400 hover:text-[var(--primary)]"><span class="material-symbols-outlined">notifications</span></button>
    </div>
</header>

<main class="p-8">
    <div class="flex flex-wrap items-center justify-between mb-8 bg-[var(--card)]/50 p-4 rounded-lg border border-slate-100 shadow-sm gap-4">
        <div class="flex items-center gap-3">

            <div class="relative">
                <select id="sort-date" class="filter-select">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                </select>
                <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
            </div>

            <div class="relative w-64">
                <span class="absolute inset-y-0 left-3 flex items-center text-slate-400">
                    <span class="material-symbols-outlined text-[20px]">search</span>
                </span>
                <input id="search-input"
                       class="w-full bg-[var(--card)] border border-slate-200 rounded-lg pl-10 pr-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--primary)]/20 transition-all"
                       placeholder="Search titles..." type="text"/>
            </div>
        </div>
    </div>

    <div class="bg-[var(--card)] shadow-sm border border-slate-100 overflow-hidden rounded-sm">
        <table class="w-full text-left text-sm">
            <thead>
            <tr class="text-[10px] text-slate-400 uppercase border-b border-slate-50 font-bold bg-slate-50/50">
                <th class="p-6">Post Title</th>
                <th class="p-6">Author</th>
                <th class="p-6">Category</th>
                <th class="p-6 text-right">Actions</th>
            </tr>
            </thead>
            <tbody id="posts-tbody" class="divide-y divide-slate-50 text-slate-600">
            </tbody>
        </table>
    </div>

    <div class="mt-6 flex justify-between items-center bg-[var(--card)] p-4 border border-slate-100 rounded-sm shadow-sm">
        <p class="text-xs text-slate-400 font-medium">
            Showing <span id="start-idx" class="font-bold text-slate-700">0</span> to <span id="end-idx" class="font-bold text-slate-700">0</span> of <span id="total-count" class="font-bold text-slate-700">0</span> posts
        </p>
        <div id="pagination-controls" class="flex gap-2">
        </div>
    </div>
</main>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
    const API_BASE = "https://blog-inkwell.onrender.com";
    let allPosts = [];

    // Biến cho phân trang
    let currentPage = 1;
    const postsPerPage = 5;

    $(document).ready(function() {
        $("#sidebar-placeholder").load("/fragments/admin_sidebar.html", function() {
            $("#nav-posts").addClass("active");
        });

        loadPosts();

        // Reset về trang 1 mỗi khi lọc hoặc tìm kiếm
        $('#sort-date, #search-input').on('change input', function() {
            currentPage = 1;
            renderPosts();
        });
    });

    function showToast(message) {
        const x = document.getElementById("toast");
        x.innerText = message;
        x.style.visibility = "visible";
        x.style.animation = "fadein 0.5s, fadeout 0.5s 2.5s";
        setTimeout(() => { x.style.visibility = "hidden"; x.style.animation = ""; }, 3000);
    }

    function loadPosts() {
        const token = localStorage.getItem('token');
        $.ajax({
            url: `${API_BASE}/blogs`,
            type: 'GET',
            headers: { 'Authorization': 'Bearer ' + token },
            success: function(res) {
                // Đảm bảo chỉ lấy các post đã xuất bản (không nháp) từ phía FE nếu API gửi cả đống
                allPosts = (res.result || []).filter(p => !p.draft);
                renderPosts();
            },
            error: function(err) {
                console.error("Failed to load posts", err);
            }
        });
    }

    function renderPosts() {
        const sort = $('#sort-date').val();
        const search = $('#search-input').val().toLowerCase();

        // 1. Lọc dữ liệu
        let filtered = [...allPosts];
        if (search) filtered = filtered.filter(p => p.title.toLowerCase().includes(search));

        // 2. Sắp xếp
        filtered.sort((a, b) => {
            const dateA = new Date(a.createdAt);
            const dateB = new Date(b.createdAt);
            return sort === 'newest' ? dateB - dateA : dateA - dateB;
        });

        // 3. Phân trang
        const totalItems = filtered.length;
        const totalPages = Math.ceil(totalItems / postsPerPage) || 1;

        if (currentPage > totalPages) currentPage = totalPages;

        const startIndex = (currentPage - 1) * postsPerPage;
        const endIndex = Math.min(startIndex + postsPerPage, totalItems);
        const paginatedPosts = filtered.slice(startIndex, endIndex);

        // Cập nhật text hiển thị số lượng
        $('#total-count').text(totalItems);
        $('#start-idx').text(totalItems === 0 ? 0 : startIndex + 1);
        $('#end-idx').text(endIndex);

        // Vẽ danh sách bài viết
        const $tbody = $('#posts-tbody').empty();
        paginatedPosts.forEach(post => {
            const author = post.author?.username || 'unknown';

            $tbody.append(`
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-6 font-medium text-slate-800">${post.title}</td>
                    <td class="p-6 font-mono text-[11px]">@${author}</td>
                    <td class="p-6 text-xs text-slate-400">${post.category?.name || 'Uncategorized'}</td>
                    <td class="p-6 text-right text-slate-300">
                        <a href="/pages/post.html?id=${post.id}" target="_blank" class="hover:text-[var(--primary)] mr-3 inline-block">
                            <span class="material-symbols-outlined text-lg">visibility</span>
                        </a>
                        <button onclick="deletePost('${post.id}')" class="hover:text-red-400">
                            <span class="material-symbols-outlined text-lg">delete</span>
                        </button>
                    </td>
                </tr>
            `);
        });

        renderPaginationControls(totalPages);
    }

    function renderPaginationControls(totalPages) {
        const container = $('#pagination-controls').empty();
        for (let i = 1; i <= totalPages; i++) {
            const btn = $(`<button class="pagination-btn ${i === currentPage ? 'active' : ''}">${i}</button>`);
            btn.click(() => {
                currentPage = i;
                renderPosts();
            });
            container.append(btn);
        }
    }

    function deletePost(id) {
        if (!confirm("Are you sure you want to delete this post permanently?")) return;

        $.ajax({
            url: `${API_BASE}/blogs/${id}`,
            type: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') },
            success: function() {
                allPosts = allPosts.filter(p => p.id !== id);

                // Nếu xóa phần tử cuối cùng của trang, lùi lại 1 trang
                if (allPosts.length % postsPerPage === 0 && currentPage > 1) {
                    currentPage--;
                }

                renderPosts();
                showToast("Post deleted successfully!");
            },
            error: function(err) {
                alert("Failed to delete post.");
            }
        });
    }
</script>

</body>
</html>
