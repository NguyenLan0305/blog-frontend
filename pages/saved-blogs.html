<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Saved Reading | Inkwell</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Newsreader:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" type="text/css" href="/assets/css/main.css"/>

  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { background-color: var(--bg) !important; color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
    ::-webkit-scrollbar { display: none; }
    html { -ms-overflow-style: none; scrollbar-width: none; }

    #navbar-container { position: fixed; top: 0; width: 100%; z-index: 1050; background: var(--bg); border-bottom: 1px solid rgba(66,72,85,0.15); }
    a { text-decoration: none !important; }
  </style>
</head>
<body class="overflow-x-hidden bg-background no-global-search">

<div id="navbar-container"></div>

<div id="dashboard-sidebar-container"></div>

<div class="md:ml-64 flex flex-col min-h-screen" style="padding-top: 100px;">
  <main class="flex-1 p-6 md:p-10 max-w-5xl mx-auto w-full">
    <section class="mb-10 border-b border-[var(--border)] pb-4">
      <h2 class="font-['Newsreader'] text-4xl md:text-5xl font-bold text-[var(--text)] mb-2 italic">Saved Reading</h2>
      <p class="text-[var(--muted)] text-lg">Posts you’ve saved for later.</p>
    </section>

    <div id="saved-list" class="space-y-6">
      <div class="text-center py-10 text-[var(--muted)]">Loading...</div>
    </div>
  </main>
</div>

<div id="confirm-modal" class="fixed inset-0 bg-[var(--bg)]/80 backdrop-blur-sm z-[1060] hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
  <div class="bg-[var(--card)] border border-[var(--border)] rounded-xl p-6 max-w-sm w-full mx-4 transform scale-95 transition-transform duration-300 shadow-2xl">
    <div class="flex items-center gap-3 mb-4">
      <div class="bg-red-500/10 text-red-500 p-2 rounded-full flex items-center justify-center">
        <span class="material-symbols-outlined">warning</span>
      </div>
      <h3 class="text-lg font-bold text-[var(--text)] font-['Inter']">Bỏ lưu bài viết?</h3>
    </div>
    <p class="text-[var(--muted)] text-sm mb-6 leading-relaxed">Bạn có chắc chắn muốn xóa bài viết này khỏi danh sách đọc sau không?</p>
    <div class="flex justify-end gap-3">
      <button onclick="closeConfirmModal()" class="px-5 py-2.5 rounded-lg text-sm font-medium text-[var(--muted)] hover:text-[var(--text)] hover:bg-[var(--bg-card-h)] transition-all">Hủy</button>
      <button id="btn-confirm-delete" class="px-5 py-2.5 rounded-lg text-sm font-bold bg-red-500 text-[var(--card)] hover:bg-red-600 transition-all flex items-center gap-2">Xóa</button>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="/assets/js/app.js"></script>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/nav.js"></script>

<script>
  let blogIdToRemove = null; // Biến tạm lưu ID bài viết cần xóa

  $(document).ready(function() {
    window.HIDE_GLOBAL_SEARCH = true;
    $('#navbar-container').load('/fragments/navbar.html', function() {
      if (typeof updateNavAuth === 'function') updateNavAuth();
    });

    // LOAD SIDEBAR
    $('#dashboard-sidebar-container').load('/fragments/dashboard-sidebar.html');

    if (!S.isAuth) {
      window.location.href = '/pages/login.html';
    } else {
      loadSavedBlogs();
    }

    // Gắn sự kiện cho nút Xác nhận xóa trong Modal
    $('#btn-confirm-delete').on('click', function() {
      if (!blogIdToRemove) return;

      const btn = $(this);
      const originalText = btn.text();
      btn.html('<span class="material-symbols-outlined text-[1rem]" style="animation: spin 1s linear infinite;">sync</span> Đang xóa...').prop('disabled', true);

      callApi('/blogs/' + blogIdToRemove + '/bookmark', 'POST').done(function() {
        toast("Đã bỏ lưu bài viết"); // Toast thông báo thành công xanh/đẹp ở góc dưới
        $(`#bookmark-${blogIdToRemove}`).fadeOut(300, function() { $(this).remove(); });

        if ($('.bg-\\[\\var(--card)\\]').length <= 1) { setTimeout(loadSavedBlogs, 300); }
        closeConfirmModal();
      }).fail(function() {
        toast("Lỗi! Không thể bỏ lưu.");
      }).always(function() {
        btn.html(originalText).prop('disabled', false); // Trả lại trạng thái nút
      });
    });
  });

  function loadSavedBlogs() {
    const $list = $('#saved-list');
    callApi('/blogs/bookmarks', 'GET').done(function(res) {
      const blogs = res.result || [];
      $list.empty();

      if (blogs.length === 0) {
        $list.html(`
                    <div class="text-center py-16 bg-[var(--card)] rounded-2xl border border-dashed border-[var(--border)]">
                        <span class="material-symbols-outlined text-5xl text-[var(--border)] mb-3">bookmark_border</span>
                        <p class="text-[var(--muted)]">No saved posts yet</p>
                        <a href="/pages/home-page.html" class="text-[var(--primary)] hover:underline mt-2 inline-block font-medium">Discover posts</a>
                    </div>
                `);
        return;
      }

      blogs.forEach(p => {
        const bannerUrl = p.banner ? p.banner : 'https://placehold.co/600x400/f8fafc/667085?text=No+Image';
        const dateStr = fmtDate(p.createdAt);
        const authorName = p.author ? p.author.username : 'Anonymous';
        const catName = p.category ? p.category.name : 'Khác';

        $list.append(`
                    <article id="bookmark-${p.id}" class="bg-[var(--card)] rounded-xl overflow-hidden hover:bg-[var(--bg-card-h)] transition-all flex items-center p-3 gap-4 border border-[var(--border)]">
                        <div class="w-24 h-24 md:w-32 md:h-32 flex-shrink-0 rounded-lg overflow-hidden cursor-pointer" onclick="window.location.href='/pages/post.html?id=${p.slug}'">
                            <img class="w-full h-full object-cover" src="${bannerUrl}" alt="Banner"/>
                        </div>
                        <div class="flex-1 flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div>
                                <h3 class="font-['Newsreader'] text-xl font-bold text-[var(--text)] mb-1">
                                    <a href="/pages/post.html?id=${p.slug}" class="text-[var(--card)] hover:text-[var(--primary)] transition-colors">${p.title}</a>
                                </h3>
                                <p class="text-[var(--muted)] text-xs mb-3">By <span class="text-[var(--card)] font-medium">${authorName}</span> • ${dateStr} • ${catName}</p>
                                <button onclick="openConfirmModal('${p.id}')" class="px-4 py-1.5 rounded-full border border-red-500/30 text-red-400 text-xs font-medium hover:bg-red-500 hover:text-[var(--card)] transition-colors flex items-center gap-1 w-max">
                                    Bỏ lưu
                                </button>
                            </div>
                        </div>
                    </article>
                `);
      });
    }).fail(function() {
      $list.html('<p class="text-center text-red-400 mt-5">Lỗi kết nối máy chủ.</p>');
    });
  }

  // --- LOGIC ĐÓNG MỞ MODAL XÁC NHẬN ---
  function openConfirmModal(blogId) {
    blogIdToRemove = blogId; // Lưu lại ID
    const $modal = $('#confirm-modal');
    $modal.removeClass('hidden').addClass('flex');

    // Tạo độ trễ xíu để CSS Transition chạy mượt
    setTimeout(() => {
      $modal.removeClass('opacity-0').addClass('opacity-100');
      $modal.find('div').first().removeClass('scale-95').addClass('scale-100');
    }, 10);
  }

  function closeConfirmModal() {
    const $modal = $('#confirm-modal');
    $modal.removeClass('opacity-100').addClass('opacity-0');
    $modal.find('div').first().removeClass('scale-100').addClass('scale-95');

    setTimeout(() => {
      $modal.removeClass('flex').addClass('hidden');
      blogIdToRemove = null; // Xóa ID tạm
    }, 300);
  }
</script>
</body>
</html>
