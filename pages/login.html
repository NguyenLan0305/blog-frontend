<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/assets/css/main.css"/>
    <style>
        /* Tùy chỉnh vị trí Toast để luôn nổi trên cùng góc phải */
        .toast-container {
            z-index: 1055;
        }
        body { background: var(--bg); color: var(--text); }
        .card { background: var(--card); border: 1px solid var(--border) !important; }
        .form-control { background: var(--card); color: var(--text); border-color: var(--border); }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 .2rem rgba(109,93,246,.15); }
    </style>
</head>
<body>

<div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="liveToast" class="toast align-items-center text-bg-danger border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" id="toastMessage">
            </div>
            <button type="button" class="btn-close  me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<div class="container">
    <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4 fw-bold">Đăng Nhập</h2>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="username" class="form-label">Tên đăng nhập</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Mật khẩu</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>

                        <div class="d-flex justify-content-between mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="remember" name="remember">
                                <label class="form-check-label small" for="remember">Ghi nhớ</label>
                            </div>
                            <a href="/pages/forgot-password.html" class="small text-decoration-none">Quên mật khẩu?</a>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary" id="btnSubmit">Đăng nhập</button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <span class="small text-muted">Chưa có tài khoản? <a href="/pages/register.html" class="text-primary text-decoration-none">Đăng ký</a></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
    // Hàm tiện ích để hiển thị thông báo Toast
    function showToast(message, type = 'danger') {
        const toastElement = document.getElementById('liveToast');
        const toastBody = document.getElementById('toastMessage');

        toastBody.textContent = message;
        toastElement.className = `toast align-items-center text-bg-${type} border-0`;

        const toast = new bootstrap.Toast(toastElement);
        toast.show();
    }

    // Xử lý sự kiện Submit Form bằng jQuery AJAX
    $('#loginForm').on('submit', function(event) {
        event.preventDefault();

        const user = $('#username').val();
        const pass = $('#password').val();

        const btnSubmit = $('#btnSubmit');
        const originalText = btnSubmit.html();

        // Hiệu ứng Loading
        btnSubmit.html('<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Đang xử lý...').prop('disabled', true);

        $.ajax({
            url: 'https://blog-inkwell.onrender.com/auth/login',
            type: 'POST',
            contentType: 'application/json',
            xhrFields: {
                withCredentials: true
            },
            data: JSON.stringify({
                username: user,
                password: pass
            }),
            success: function(res) {
                // Phục hồi nút bấm
                btnSubmit.html(originalText).prop('disabled', false);

                // Kiểm tra code thành công từ API
                if (res.code === 1000) {
                    // Lưu lại username để hiển thị ở Navbar
                    localStorage.setItem('username', user);

                    showToast('Đăng nhập thành công! Đang chuyển hướng...', 'success');
                    setTimeout(() => {
                        window.location.href = "/index.html";
                    }, 1000);
                } else {
                    showToast('Đăng nhập thất bại: ' + (res.message || 'Lỗi không xác định'));
                }
            },
            error: function(xhr) {
                // Phục hồi nút bấm
                btnSubmit.html(originalText).prop('disabled', false);

                console.error('Lỗi kết nối:', xhr);

                // Trích xuất câu thông báo lỗi từ Spring Boot (nếu có)
                let errMsg = 'Không thể kết nối đến Server Backend!';
                if (xhr.responseJSON && xhr.responseJSON.message) {
                    errMsg = xhr.responseJSON.message;
                }

                showToast('Đăng nhập thất bại: ' + errMsg);
            }
        });
    });
</script>
</body>
</html>
