<aside class="hidden md:flex w-64 fixed left-0 bg-[var(--bg)] flex flex-col py-8 px-6 space-y-8 border-r border-[var(--border)]" style="top: 72px; height: calc(100vh - 72px); z-index: 1040;">
    <div class="px-2">
        <h3 class="font-['Newsreader'] text-xl text-[var(--text)] italic">Editorial Studio</h3>
        <p class="text-[10px] text-[var(--muted)] uppercase tracking-widest mt-1">Workspace</p>
    </div>

    <nav class="flex-1 overflow-y-auto space-y-6 [scrollbar-width:none] [-ms-overflow-style:none] [&::-webkit-scrollbar]:hidden">

        <div class="space-y-2">
            <p class="px-4 text-[10px] font-bold text-[var(--muted)]/50 uppercase tracking-[0.2em]">Dashboard</p>
            <div class="space-y-1">
                <a class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg transition-all font-['Inter'] text-sm uppercase no-underline" href="/pages/manage-blogs.html">
                    <span class="material-symbols-outlined">article</span> <span>Blog</span>
                </a>
                <a class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg transition-all font-['Inter'] text-sm uppercase no-underline" href="/pages/saved-blogs.html">
                    <span class="material-symbols-outlined">bookmark</span> <span>Saved Reading</span>
                </a>
                <a class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg transition-all font-['Inter'] text-sm uppercase no-underline" href="/pages/blog-editor.html">
                    <span class="material-symbols-outlined">edit_square</span> <span>Write</span>
                </a>
            </div>
        </div>

        <div class="space-y-2">
            <p class="px-4 text-[10px] font-bold text-[var(--muted)]/50 uppercase tracking-[0.2em]">Settings</p>
            <div class="space-y-1">
                <a class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg transition-all font-['Inter'] text-sm uppercase no-underline" href="/pages/edit-profile.html">
                    <span class="material-symbols-outlined">manage_accounts</span> <span>Edit Profile</span>
                </a>
                <a class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg transition-all font-['Inter'] text-sm uppercase no-underline" href="/pages/change-password.html">
                    <span class="material-symbols-outlined">lock_reset</span> <span>Change Password</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="mt-auto space-y-2">
        <a id="btn-logout-sidebar" class="flex items-center gap-3 px-4 py-2 text-[var(--muted)] hover:text-red-400 no-underline text-xs transition-colors cursor-pointer">
            <span class="material-symbols-outlined text-lg">logout</span> <span>Sign Out</span>
        </a>
    </div>
</aside>

<script>
    $(document).ready(function() {
        var path = window.location.pathname;
        // Mặc định nếu ở thư mục gốc thì gán là manage-blogs.html
        var page = path.split("/").pop().toLowerCase() || 'manage-blogs.html';

        var activeClasses = "text-[var(--primary)] border-r-2 border-[var(--primary)] bg-gradient-to-r from-[var(--primary)]/10 to-transparent font-bold";
        var inactiveClasses = "text-[var(--muted)] hover:bg-[var(--secondary)] hover:text-[var(--text)]";

        $('.sidebar-link').each(function() {
            // Cắt lấy phần đuôi của href để so sánh 1-1 với biến page
            var hrefPart = $(this).attr('href').split("/").pop().toLowerCase();

            if (page === hrefPart) {
                $(this).addClass(activeClasses).removeClass(inactiveClasses);
                $(this).find('.material-symbols-outlined').css('font-variation-settings', "'FILL' 1");
            } else {
                $(this).addClass(inactiveClasses).removeClass(activeClasses);
                $(this).find('.material-symbols-outlined').css('font-variation-settings', "'FILL' 0");
            }
        });

        $('#btn-logout-sidebar').on('click', function(e) {
            e.preventDefault();

            // Ưu tiên "mượn" nút logout ở Navbar trên cùng (đã được cấu hình chuẩn trong nav.js)
            if ($('#btn-logout').length) {
                $('#btn-logout').click();
            }
            else if (typeof window.logout === 'function') {
                window.logout();
            }
            else {
                // Đảm bảo gọi API Server để hủy HttpOnly Cookie nếu Navbar không tồn tại
                if (typeof callApi === 'function') {
                    callApi('/auth/logout', 'POST').always(function() {
                        clearLocalAuth();
                    });
                } else {
                    clearLocalAuth();
                }
            }
        });

        // Hàm dọn dẹp dự phòng
        function clearLocalAuth() {
            localStorage.removeItem('username');
            localStorage.removeItem('avatarUrl');
            localStorage.removeItem('notif_cleared_time');
            window.location.href = '/index.html';
        }
    });
</script>
